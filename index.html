
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Short Video AI Generator | АКСЕЛЕРАТОР</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&family=Prosto+One&family=Oswald:wght@400;700&family=Comfortaa:wght@400;700&family=Montserrat:wght@900&family=PT+Sans:wght@400;700&family=Unbounded:wght@400;900&family=Days+One&family=Geologica:wght@400;500;700&family=Manrope:wght@300;400;700&display=block" rel="stylesheet" crossorigin="anonymous">
  <style>
    body { 
      font-family: 'Inter', sans-serif; 
      background-color: #020208; 
      color: white; 
      margin: 0; 
      padding: 0;
      overflow-x: hidden;
    }
    
    .font-bebas-neue { font-family: 'Bebas Neue', sans-serif; }
    .font-prosto { font-family: 'Prosto One', cursive; }
    .font-oswald { font-family: 'Oswald', sans-serif; }
    .font-soyuzx-cyr { font-family: 'Montserrat', sans-serif; font-weight: 900; }
    .font-unbounded { font-family: 'Unbounded', sans-serif; }
    .font-days { font-family: 'Days One', sans-serif; }

    .font-manrope { font-family: 'Manrope', sans-serif; }
    .font-manrope-light { font-family: 'Manrope', sans-serif; font-weight: 300; }
    .font-inter { font-family: 'Inter', sans-serif; }
    .font-inter-light { font-family: 'Inter', sans-serif; font-weight: 300; }
    .font-pt-root { font-family: 'Geologica', sans-serif; font-weight: 400; letter-spacing: -0.01em; } 
    .font-comfortaa { font-family: 'Comfortaa', cursive; }
    .font-pt-sans { font-family: 'PT Sans', sans-serif; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-step { animation: fadeIn 0.6s ease-out forwards; }

    #initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #020208;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    .loader-spin {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
<body>
  <div id="initial-loader"><div class="loader-spin"></div></div>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
